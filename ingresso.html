<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f2c2f">
<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ingressos">
<link rel="apple-touch-icon" href="assets/acdc.png">
<link rel="manifest" href="../manifest.json">
<title>Ingresso</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page" id="pageRoot">
  <!-- Conteúdo gerado dinamicamente pelo JS -->
  <div id="loadingState" style="text-align:center;padding:40px;opacity:0.5;font-size:14px;">
    Carregando...
  </div>
</div>

<script src="config.js"></script>
<script>
// =============================================
// QR Images cycle
// =============================================
const qrImages = [
  'assets/qr1.png','assets/qr2.png','assets/qr3.png',
  'assets/qr4.png','assets/qr5.png'
];

let qrCycleIndex = 0;

function cycleQR() {
  qrCycleIndex = (qrCycleIndex + 1) % qrImages.length;
  document.querySelectorAll('.qr-img').forEach((img, i) => {
    // Each ticket gets its own QR from the cycle, offset by ticket index
    const cfg = getConfig();
    const ticketQR = cfg.tickets[i]?.qrImage || qrImages[qrCycleIndex];
    img.src = ticketQR;
  });
}

setInterval(cycleQR, 20000);

// =============================================
// Build HTML for a single ticket
// =============================================
function buildTicketHTML(ticket, index) {
  const qr = ticket.qrImage || qrImages[index % qrImages.length];
  return `
    <div class="ticket-wrapper">

      <div class="ticketmaster-img">
        <img src="${escHtml(cfg.event.bannerImage)}" alt="Banner ${escHtml(cfg.event.name)}">
      </div>

      <div class="ticket-card top-card">
        <div class="ticket-top">

          <div class="qr-area">
            <img src="${escHtml(qr)}" class="qr-img" alt="QR Code ingresso ${index + 1}">
          </div>

          <div class="ticket-side">
            <div class="side-block">
              <span class="mini-label">SETOR</span>
              <span class="sector-name">${escHtml(ticket.sector)}</span>
            </div>
            <div class="side-block">
              <span class="mini-label">ACESSO</span>
              <span class="sector-name acesso-value">${escHtml(ticket.lastAccess)}</span>
            </div>
            <button class="more-info-btn">Mais informação</button>
          </div>

        </div>
      </div>

      <div class="ticket-card info-card">
        <div class="info-full">
          <span class="mini-label">TITULAR</span>
          <span class="info-value">${escHtml(ticket.holder)} - ${escHtml(ticket.cpf)}</span>
        </div>
        <div class="info-full">
          <span class="mini-label">TAXA</span>
          <span class="info-value">${escHtml(ticket.rate)}</span>
        </div>
        <div class="info-row">
          <div>
            <span class="mini-label">SEÇÃO</span>
            <span class="info-value">${escHtml(ticket.section)}</span>
          </div>
          <div>
            <span class="mini-label">FILEIRA</span>
            <span class="info-value">${escHtml(ticket.row)}</span>
          </div>
        </div>
        <div class="info-row">
          <div>
            <span class="mini-label">ABERTURA</span>
            <span class="info-value">${escHtml(ticket.open)}</span>
          </div>
          <div>
            <span class="mini-label">INICIO</span>
            <span class="info-value">${escHtml(ticket.start)}</span>
          </div>
        </div>
      </div>

    </div>
  `;
}

// =============================================
// Render full page
// =============================================
const cfg = getConfig();
const ev  = cfg.event;

document.title = ev.name || 'Ingresso';

const ticketsHTML = cfg.tickets.map(buildTicketHTML).join('');

document.getElementById('pageRoot').innerHTML = `
  <div class="event-header">
    <a href="index.html" class="back" aria-label="Voltar">←</a>
    <div>
      <h1>${escHtml(ev.name)}</h1>
      <p>${escHtml(ev.date)} - ${escHtml(ev.venue)}</p>
    </div>
  </div>

  <div class="carousel">
    <div class="carousel-track" id="carouselTrack">
      ${ticketsHTML}
    </div>
  </div>
`;

// =============================================
// Util
// =============================================
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
